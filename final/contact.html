<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenTech Solutions | Contact</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header>
        <nav class="navbar">
            <h1 class="logo">GreenTech Solutions</h1>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Contact Us</h2>

        <form id="contactForm">
            <label for="name">Name</label>
            <input id="name" type="text" required>

            <label for="email">Email</label>
            <input id="email" type="email" required>

            <label for="message">Message</label>
            <textarea id="message" required></textarea>

            <button type="submit">Send Message</button>
        </form>

        <p id="formMessage" class="hidden"></p>

        <section>
            <h3>Company Info</h3>
            <p>Email: info@greentech.com</p>
            <p>Phone: (555) 123‑4567</p>
            <p>Address: 123 Eco Way, Denver, CO</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 GreenTech Solutions</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
